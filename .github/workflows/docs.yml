name: docs-ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Build docs
        run: uv run sphinx-build -W --keep-going -b html docs docs/_build/html
